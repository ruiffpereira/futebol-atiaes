services:
  torneio:
    build: .
    expose:
      - "3000"
    labels:
      - traefik.docker.network=edr2lnb85qn2gwkuhy7tcsoq
    environment:
      - SERVICE_FQDN_TORNEIO_3000=atiaesfutebol.rufvision.com
      - NODE_ENV=production
      - DATA_DIR=/data
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-atiaes-troca-me}
      - AUTH_SECRET=${AUTH_SECRET:-muda-me-string-aleatoria-longa}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:torneio@atiaes.pt}
    volumes:
      - "torneio-data:/data"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - "-qO-"
        - "http://127.0.0.1:3000/api/health"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  torneio-data:
